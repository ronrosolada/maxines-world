services:
  content-server:
    image: caddy:2-alpine
    container_name: maxines-world-content
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./content:/srv:ro
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /config
      - /data
