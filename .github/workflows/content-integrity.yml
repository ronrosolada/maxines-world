name: Content integrity

on:
  pull_request:
    paths:
      - "android/**"
      - "scripts/**"
      - ".github/workflows/content-integrity.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: content-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  content-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Inventory legacy and canonical content
        run: python3 scripts/inventory_existing_content.py --repo . --strict --json-out build/reports/content-inventory.json

      - name: Validate complete bundled baseline
        run: python3 scripts/validate_content_pack.py --root android/app/src/main/assets/content/bootstrap --strict

      - name: Reject NAS and cleartext content configuration
        run: python3 scripts/verify_no_nas.py --repo .

      - name: Verify bootstrap reproducibility
        run: python3 scripts/build_bootstrap_catalog.py --check --repo .

      - name: Upload content reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-integrity-reports
          path: build/reports/
          if-no-files-found: warn

  android-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Full unit tests
        run: ./gradlew clean test --stacktrace

      - name: Android lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-verification
          path: |
            android/app/build/outputs/apk/debug/*.apk
            **/build/reports/tests/**
            **/build/reports/lint-results-*.html
          if-no-files-found: warn

  instrumentation:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run connected instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest --stacktrace

      - name: Upload instrumentation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation-reports
          path: "**/build/reports/androidTests/**"
          if-no-files-found: warn
