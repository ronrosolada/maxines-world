<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#E8F5E9" rx="20"/>
  <text x="400" y="40" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="22" font-weight="bold" fill="#1B5E20">Geometry Explorers: Points &amp; Lines 📐</text>
  
  <!-- Point example -->
  <circle cx="100" cy="120" r="8" fill="#D32F2F"/>
  <text x="100" y="150" text-anchor="middle" font-family="Nunito, sans-serif" font-size="14" fill="#333">Point A</text>
  <text x="100" y="170" text-anchor="middle" font-family="Nunito, sans-serif" font-size="11" fill="#666">(exact location)</text>
  
  <!-- Line segment example -->
  <line x1="250" y1="100" x2="450" y2="100" stroke="#1976D2" stroke-width="3"/>
  <circle cx="250" cy="100" r="5" fill="#1976D2"/>
  <circle cx="450" cy="100" r="5" fill="#1976D2"/>
  <text x="350" y="90" text-anchor="middle" font-family="Nunito, sans-serif" font-size="14" fill="#333">Line Segment CD</text>
  <text x="350" y="130" text-anchor="middle" font-family="Nunito, sans-serif" font-size="11" fill="#666">(has two endpoints)</text>
  
  <!-- Ray example -->
  <line x1="550" y1="100" x2="700" y2="100" stroke="#E65100" stroke-width="3"/>
  <circle cx="550" cy="100" r="5" fill="#E65100"/>
  <text x="625" y="90" text-anchor="middle" font-family="Nunito, sans-serif" font-size="14" fill="#333">Ray EF</text>
  <text x="625" y="130" text-anchor="middle" font-family="Nunito, sans-serif" font-size="11" fill="#666">(one endpoint, goes forever)</text>
  
  <!-- Parallel lines -->
  <line x1="80" y1="240" x2="300" y2="240" stroke="#7B1FA2" stroke-width="3"/>
  <line x1="80" y1="280" x2="300" y2="280" stroke="#7B1FA2" stroke-width="3"/>
  <text x="190" y="235" text-anchor="middle" font-family="Nunito, sans-serif" font-size="14" fill="#333">Parallel Lines</text>
  <text x="190" y="310" text-anchor="middle" font-family="Nunito, sans-serif" font-size="11" fill="#666">(never meet)</text>
  
  <!-- Perpendicular lines -->
  <line x1="500" y1="220" x2="500" y2="320" stroke="#00695C" stroke-width="3"/>
  <line x1="450" y1="270" x2="550" y2="270" stroke="#00695C" stroke-width="3"/>
  <rect x="495" y="265" width="10" height="10" fill="#00695C" rx="1"/>
  <text x="500" y="345" text-anchor="middle" font-family="Nunito, sans-serif" font-size="14" fill="#333">Perpendicular</text>
  <text x="500" y="365" text-anchor="middle" font-family="Nunito, sans-serif" font-size="11" fill="#666">(meet at right angle)</text>
  
  <!-- Mascot -->
  <circle cx="400" cy="430" r="40" fill="#FFCC80"/>
  <text x="400" y="440" text-anchor="middle" font-size="30">📏</text>
  <text x="400" y="480" text-anchor="middle" font-family="Nunito, sans-serif" font-size="14" fill="#5D4037">Can you find points and lines around you?</text>
</svg>