<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs><linearGradient id="sbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="50%" stop-color="#BBDEFB"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient></defs>
  <rect width="800" height="500" fill="url(#sbg)" rx="20"/>
  <rect x="180" y="20" width="440" height="46" rx="12" fill="#1565C0"/><text x="400" y="50" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">🦁 Amazing Animals Around Us</text>
  <!-- Dog --><g transform="translate(55, 95)"><rect x="0" y="0" width="150" height="160" rx="14" fill="white" stroke="#42A5F5" stroke-width="2"/><circle cx="75" cy="52" r="32" fill="#FFE082"/><circle cx="62" cy="43" r="4.5" fill="#333"/><circle cx="88" cy="43" r="4.5" fill="#333"/><ellipse cx="75" cy="57" rx="7" ry="4.5" fill="#333"/><ellipse cx="48" cy="30" rx="10" ry="16" fill="#FFB74D"/><ellipse cx="102" cy="30" rx="10" ry="16" fill="#FFB74D"/><text x="75" y="108" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1565C0">Dog 🐕</text><text x="75" y="126" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">A friendly pet</text><text x="75" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">Has fur and 4 legs</text></g>
  <!-- Fish --><g transform="translate(230, 95)"><rect x="0" y="0" width="150" height="160" rx="14" fill="white" stroke="#42A5F5" stroke-width="2"/><ellipse cx="75" cy="52" rx="38" ry="20" fill="#FF8A65"/><circle cx="98" cy="47" r="4.5" fill="white"/><circle cx="99" cy="47" r="2.2" fill="#333"/><polygon points="42,52 24,36 24,68" fill="#FF8A65"/><path d="M55 43 Q60 52 55 61" stroke="#FFAB91" stroke-width="1" fill="none"/><path d="M65 41 Q70 50 65 59" stroke="#FFAB91" stroke-width="1" fill="none"/><text x="75" y="108" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1565C0">Fish 🐟</text><text x="75" y="126" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">Lives in water</text><text x="75" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">Breathes with gills!</text></g>
  <!-- Bird --><g transform="translate(405, 95)"><rect x="0" y="0" width="150" height="160" rx="14" fill="white" stroke="#42A5F5" stroke-width="2"/><circle cx="75" cy="47" r="24" fill="#EF5350"/><circle cx="84" cy="42" r="3.5" fill="white"/><circle cx="85" cy="42" r="1.8" fill="#333"/><polygon points="93,47 112,45 93,50" fill="#FFD600"/><ellipse cx="56" cy="52" rx="18" ry="11" fill="#E53935" transform="rotate(-15,56,52)"/><line x1="66" y1="71" x2="61" y2="85" stroke="#FF8F00" stroke-width="2"/><line x1="75" y1="71" x2="80" y2="85" stroke="#FF8F00" stroke-width="2"/><text x="75" y="108" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1565C0">Bird 🐦</text><text x="75" y="126" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">Has feathers</text><text x="75" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">Can fly! Lays eggs</text></g>
  <!-- Frog --><g transform="translate(580, 95)"><rect x="0" y="0" width="150" height="160" rx="14" fill="white" stroke="#42A5F5" stroke-width="2"/><circle cx="75" cy="52" r="28" fill="#66BB6A"/><circle cx="63" cy="43" r="7" fill="white"/><circle cx="63" cy="43" r="3.5" fill="#333"/><circle cx="87" cy="43" r="7" fill="white"/><circle cx="87" cy="43" r="3.5" fill="#333"/><path d="M62 62 Q75 71 88 62" stroke="#333" stroke-width="2" fill="none"/><text x="75" y="108" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1565C0">Frog 🐸</text><text x="75" y="126" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">Lives on land</text><text x="75" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">AND in water!</text></g>
  <rect x="80" y="282" width="640" height="50" rx="12" fill="#1565C0" opacity="0.1"/><text x="400" y="305" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1565C0">Every animal has special body parts that help it live! 🐾</text>
  <text x="400" y="325" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1565C0" opacity="0.7">Fur · Scales · Feathers · Smooth skin — each one is different!</text>
  <g transform="translate(640, 340)"><circle cx="0" cy="0" r="35" fill="#FFF9C4"/><circle cx="-13" cy="-8" r="5" fill="#333"/><circle cx="13" cy="-8" r="5" fill="#333"/><path d="M-8 8 Q0 18 8 8" stroke="#333" stroke-width="2" fill="none"/><circle cx="-13" cy="-8" r="9" fill="none" stroke="#1565C0" stroke-width="2"/><circle cx="13" cy="-8" r="9" fill="none" stroke="#1565C0" stroke-width="2"/><line x1="-4" y1="-8" x2="4" y2="-8" stroke="#1565C0" stroke-width="2"/></g>
  <text x="400" y="475" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1565C0">Can you name another animal with fur? With scales? 🧐</text>
</svg>