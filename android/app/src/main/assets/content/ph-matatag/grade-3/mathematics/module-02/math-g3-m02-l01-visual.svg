<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs><linearGradient id="mbg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient></defs>
  <rect width="800" height="500" fill="url(#mbg2)" rx="20"/>
  <rect x="140" y="22" width="520" height="46" rx="12" fill="#2E7D32"/><text x="400" y="52" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">🔢 Place Value: Building Big Numbers</text>
  <!-- Place value columns -->
  <g transform="translate(55, 100)">
    <rect x="0" y="0" width="140" height="120" rx="10" fill="#FFCC80" stroke="#E65100" stroke-width="2"/><text x="70" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#E65100">Thousands</text><rect x="25" y="42" width="90" height="45" rx="8" fill="white"/><text x="70" y="73" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#E65100">3</text><text x="70" y="105" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#795548">3,000</text>
    <rect x="155" y="0" width="140" height="120" rx="10" fill="#90CAF9" stroke="#1565C0" stroke-width="2"/><text x="225" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565C0">Hundreds</text><rect x="180" y="42" width="90" height="45" rx="8" fill="white"/><text x="225" y="73" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#1565C0">4</text><text x="225" y="105" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#546E7A">400</text>
    <rect x="310" y="0" width="140" height="120" rx="10" fill="#A5D6A7" stroke="#2E7D32" stroke-width="2"/><text x="380" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#2E7D32">Tens</text><rect x="335" y="42" width="90" height="45" rx="8" fill="white"/><text x="380" y="73" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#2E7D32">7</text><text x="380" y="105" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#33691E">70</text>
    <rect x="465" y="0" width="140" height="120" rx="10" fill="#F48FB1" stroke="#C2185B" stroke-width="2"/><text x="535" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#C2185B">Ones</text><rect x="490" y="42" width="90" height="45" rx="8" fill="white"/><text x="535" y="73" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#C2185B">2</text><text x="535" y="105" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#880E4F">2</text>
  </g>
  <rect x="140" y="250" width="520" height="55" rx="14" fill="#2E7D32" opacity="0.12"/><text x="400" y="284" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1B5E20">3,000 + 400 + 70 + 2 = </text><text x="540" y="290" font-family="sans-serif" font-size="34" font-weight="bold" fill="#2E7D32">3,472</text>
  <!-- Block visuals -->
  <g transform="translate(100, 330)"><rect x="0" y="0" width="45" height="45" rx="4" fill="#FFCC80" stroke="#E65100" stroke-width="2"/><text x="22" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#E65100">📦</text><text x="22" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#795548">big cube</text><rect x="80" y="5" width="42" height="7" rx="2" fill="#90CAF9" stroke="#1565C0" stroke-width="1"/><rect x="80" y="17" width="42" height="7" rx="2" fill="#90CAF9" stroke="#1565C0" stroke-width="1"/><rect x="80" y="29" width="42" height="7" rx="2" fill="#90CAF9" stroke="#1565C0" stroke-width="1"/><rect x="80" y="41" width="42" height="7" rx="2" fill="#90CAF9" stroke="#1565C0" stroke-width="1"/><text x="101" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#546E7A">4 flats</text><rect x="165" y="15" width="7" height="32" rx="2" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/><text x="168" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#33691E">×7 rods</text><circle cx="230" cy="38" r="4.5" fill="#F48FB1" stroke="#C2185B" stroke-width="1"/><circle cx="244" cy="38" r="4.5" fill="#F48FB1" stroke="#C2185B" stroke-width="1"/><text x="237" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#880E4F">2 units</text></g>
