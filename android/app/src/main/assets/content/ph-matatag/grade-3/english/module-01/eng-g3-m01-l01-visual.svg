<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#FFF8E7" rx="20"/>
  <text x="400" y="40" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="22" font-weight="bold" fill="#5D4037">Sight Word Detectives 🔍</text>
  
  <!-- Word cards -->
  <rect x="50" y="70" width="160" height="60" rx="12" fill="#FFE082" stroke="#FFA000" stroke-width="2"/>
  <text x="130" y="108" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="26" font-weight="bold" fill="#E65100">because</text>
  
  <rect x="230" y="70" width="160" height="60" rx="12" fill="#A5D6A7" stroke="#388E3C" stroke-width="2"/>
  <text x="310" y="108" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="26" font-weight="bold" fill="#1B5E20">friend</text>
  
  <rect x="410" y="70" width="160" height="60" rx="12" fill="#90CAF9" stroke="#1976D2" stroke-width="2"/>
  <text x="490" y="108" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="26" font-weight="bold" fill="#0D47A1">should</text>
  
  <rect x="590" y="70" width="160" height="60" rx="12" fill="#F48FB1" stroke="#C2185B" stroke-width="2"/>
  <text x="670" y="108" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="26" font-weight="bold" fill="#880E4F">people</text>

  <rect x="50" y="155" width="160" height="60" rx="12" fill="#CE93D8" stroke="#7B1FA2" stroke-width="2"/>
  <text x="130" y="193" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="26" font-weight="bold" fill="#4A148C">around</text>
  
  <rect x="230" y="155" width="160" height="60" rx="12" fill="#FFCC80" stroke="#E65100" stroke-width="2"/>
  <text x="310" y="193" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="26" font-weight="bold" fill="#BF360C">little</text>
  
  <rect x="410" y="155" width="160" height="60" rx="12" fill="#80CBC4" stroke="#00695C" stroke-width="2"/>
  <text x="490" y="193" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="26" font-weight="bold" fill="#004D40">always</text>
  
  <rect x="590" y="155" width="160" height="60" rx="12" fill="#FFAB91" stroke="#BF360C" stroke-width="2"/>
  <text x="670" y="193" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="26" font-weight="bold" fill="#3E2723">another</text>

  <!-- Detective mascot -->
  <circle cx="400" cy="310" r="50" fill="#FFD54F"/>
  <circle cx="385" cy="300" r="6" fill="#333"/>
  <circle cx="415" cy="300" r="6" fill="#333"/>
  <path d="M385 320 Q400 335 415 320" stroke="#333" stroke-width="2" fill="none"/>
  <rect x="370" y="265" width="60" height="25" rx="4" fill="#5D4037"/>
  <rect x="345" y="260" width="110" height="8" rx="4" fill="#5D4037"/>
  
  <!-- Magnifying glass -->
  <circle cx="320" cy="360" r="28" fill="none" stroke="#FFA000" stroke-width="6"/>
  <line x1="340" y1="380" x2="368" y2="408" stroke="#795548" stroke-width="6" stroke-linecap="round"/>

  <text x="400" y="450" text-anchor="middle" font-family="Nunito, sans-serif" font-size="16" fill="#795548">
    Can you spot all the sight words? Read each one aloud!
  </text>
</svg>