<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#E3F2FD" rx="20"/>
  <text x="400" y="40" text-anchor="middle" font-family="Baloo 2, sans-serif" font-size="22" font-weight="bold" fill="#0D47A1">Science Is Everywhere! 🔬</text>
  
  <!-- Scene 1: Kitchen -->
  <rect x="40" y="70" width="170" height="140" rx="12" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="125" y="95" text-anchor="middle" font-family="Nunito, sans-serif" font-size="13" font-weight="bold" fill="#E65100">Kitchen</text>
  <text x="125" y="115" text-anchor="middle" font-size="28">🍳</text>
  <text x="125" y="155" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" fill="#666">Cooking = Chemistry!</text>
  <text x="125" y="175" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" fill="#666">Water boils = Physics!</text>
  
  <!-- Scene 2: Garden -->
  <rect x="230" y="70" width="170" height="140" rx="12" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="315" y="95" text-anchor="middle" font-family="Nunito, sans-serif" font-size="13" font-weight="bold" fill="#2E7D32">Garden</text>
  <text x="315" y="115" text-anchor="middle" font-size="28">🌱</text>
  <text x="315" y="155" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" fill="#666">Plants grow = Biology!</text>
  <text x="315" y="175" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" fill="#666">Butterflies = Life cycle!</text>
  
  <!-- Scene 3: Playground -->
  <rect x="420" y="70" width="170" height="140" rx="12" fill="#FCE4EC" stroke="#C2185B" stroke-width="2"/>
  <text x="505" y="95" text-anchor="middle" font-family="Nunito, sans-serif" font-size="13" font-weight="bold" fill="#C2185B">Playground</text>
  <text x="505" y="115" text-anchor="middle" font-size="28">🛝</text>
  <text x="505" y="155" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" fill="#666">Sliding = Gravity!</text>
  <text x="505" y="175" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" fill="#666">Swinging = Motion!</text>
  
  <!-- Scene 4: Sky -->
  <rect x="610" y="70" width="150" height="140" rx="12" fill="#E1F5FE" stroke="#0277BD" stroke-width="2"/>
  <text x="685" y="95" text-anchor="middle" font-family="Nunito, sans-serif" font-size="13" font-weight="bold" fill="#0277BD">Sky</text>
  <text x="685" y="115" text-anchor="middle" font-size="28">🌈</text>
  <text x="685" y="155" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" fill="#666">Rainbows = Light!</text>
  <text x="685" y="175" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" fill="#666">Clouds = Weather!</text>

  <!-- Mascot: Scientist cat -->
  <circle cx="200" cy="350" r="55" fill="#FFF9C4"/>
  <circle cx="185" cy="335" r="7" fill="#333"/>
  <circle cx="215" cy="335" r="7" fill="#333"/>
  <path d="M185 360 Q200 375 215 360" stroke="#333" stroke-width="2" fill="none"/>
  <!-- Triangle ears -->
  <polygon points="155,305 165,270 175,300" fill="#FFF9C4" stroke="#E65100" stroke-width="1"/>
  <polygon points="225,305 235,270 245,300" fill="#FFF9C4" stroke="#E65100" stroke-width="1"/>
  <!-- Goggles -->
  <circle cx="185" cy="335" r="14" fill="none" stroke="#1976D2" stroke-width="2"/>
  <circle cx="215" cy="335" r="14" fill="none" stroke="#1976D2" stroke-width="2"/>
  <line x1="199" y1="335" x2="201" y2="335" stroke="#1976D2" stroke-width="2"/>
  
  <text x="400" y="440" text-anchor="middle" font-family="Nunito, sans-serif" font-size="15" fill="#1565C0" font-weight="bold">
    Science is asking "why?" and "how?" about everything around you!
  </text>
</svg>