  <rect x="350" y="40" width="500" height="50" rx="25" fill="#075F63" opacity="0.85"/>
  <circle cx="380" cy="65" r="12" fill="#F5A623"/>
  <circle cx="820" cy="65" r="12" fill="#F5A623"/>
