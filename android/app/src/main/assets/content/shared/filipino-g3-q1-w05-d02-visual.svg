      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E8F6FF"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7BC67E"/>
      <stop offset="100%" stop-color="#4FA86A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#sky)"/>
  <ellipse cx="200" cy="120" rx="60" ry="35" fill="#fff" opacity="0.85"/>
  <ellipse cx="250" cy="120" rx="45" ry="28" fill="#fff" opacity="0.85"/>
  <ellipse cx="900" cy="90" rx="70" ry="40" fill="#fff" opacity="0.8"/>
  <path d="M0 480 Q300 400 600 460 T1200 430 L1200 675 L0 675 Z" fill="#6BBF6E"/>
  <path d="M0 540 Q400 480 800 530 T1200 500 L1200 675 L0 675 Z" fill="#57A85A"/>
