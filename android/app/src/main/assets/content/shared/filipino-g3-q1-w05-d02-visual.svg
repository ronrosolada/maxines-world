    <path d="M80 20 Q120 0 160 20 L160 120 Q120 100 80 120 Z" fill="#FFF8E7" stroke="#8B5A2B" stroke-width="3"/>
    <line x1="80" y1="20" x2="80" y2="120" stroke="#C4A574" stroke-width="2"/>
  </g>
  <!-- cat silhouette (Milo-inspired, original simple) -->
  <g transform="translate(900,380)">
    <ellipse cx="60" cy="90" rx="50" ry="40" fill="#E8A87C"/>
    <circle cx="60" cy="40" r="35" fill="#E8A87C"/>
    <polygon points="30,20 25,0 45,15" fill="#E8A87C"/>
    <polygon points="90,20 95,0 75,15" fill="#E8A87C"/>
    <circle cx="48" cy="38" r="5" fill="#2C3E50"/>
    <circle cx="72" cy="38" r="5" fill="#2C3E50"/>
    <ellipse cx="60" cy="48" rx="4" ry="3" fill="#C45C26"/>
    <path d="M40 55 Q60 65 80 55" fill="none" stroke="#2C3E50" stroke-width="2"/>
    <path d="M20 90 Q0 70 15 50" fill="none" stroke="#E8A87C" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- trees -->
  <circle cx="100" cy="420" r="45" fill="#3D8B40"/>
  <rect x="92" y="450" width="16" height="50" fill="#6D4C41"/>
  <circle cx="1100" cy="400" r="50" fill="#3D8B40"/>
  <rect x="1092" y="430" width="16" height="55" fill="#6D4C41"/>
