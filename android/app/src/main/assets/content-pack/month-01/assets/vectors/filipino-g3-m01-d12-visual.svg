<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="Larawan ng aralin">
  <defs>
    <linearGradient id="sky12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#E1F5FE"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" rx="36" fill="url(#sky12)"/>
  <!-- sun -->
  <circle cx="680" cy="90" r="48" fill="#FFE082" opacity="0.95"/>
  <circle cx="680" cy="90" r="32" fill="#FFF59D"/>
